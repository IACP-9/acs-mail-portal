<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portal de correo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-7">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <h2 class="mb-3">Portal de envío</h2>
            <p class="text-muted">Azure App Service + Python + ACS Email</p>

            {% if status %}
              <div class="alert alert-success">{{ status }}</div>
            {% endif %}

            {% if error %}
              <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <form method="post">
              <div class="mb-3">
                <label class="form-label">Correo destinatario</label>
                <input type="email" class="form-control" name="to_email" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Asunto</label>
                <input type="text" class="form-control" name="subject" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Mensaje</label>
                <textarea class="form-control" name="body" rows="6" required></textarea>
              </div>

              <button type="submit" class="btn btn-primary w-100">Enviar correo</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
